x-backend-env: &backend-env
  DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD:-factorplatform_dev_password}@postgres:5432/factor_platform
  REDIS_URL: redis://redis:6379/0
  FACTOR_PLATFORM_ENV: ${FACTOR_PLATFORM_ENV:-dev}
  FACTOR_PLATFORM_REQUIRE_DB: "1"
  FACTOR_PLATFORM_REQUIRE_AUTH: "1"
  FACTOR_PLATFORM_STALE_DATA_BLOCKS: ${FACTOR_PLATFORM_STALE_DATA_BLOCKS:-1}
  FACTOR_PLATFORM_MARKET_DATA_BACKEND: ${FACTOR_PLATFORM_MARKET_DATA_BACKEND:-files}
  FACTOR_PLATFORM_ARTIFACT_ROOT: /app/data/artifacts
  FACTOR_PLATFORM_RUNS_DIR: /app/data/artifacts/factor_runs
  FACTOR_PLATFORM_BACKTEST_DIR: /app/data/artifacts/backtests
  FACTOR_PLATFORM_DATA_MAINTENANCE_DIR: /app/data/artifacts/data_maintenance
  FACTOR_PLATFORM_QLIB_RESEARCH_DIR: /app/data/artifacts/qlib_research
  FACTOR_PLATFORM_RESEARCH_QUALITY_DIR: /app/data/artifacts/research_quality
  FACTOR_PLATFORM_OPENBB_DIR: /app/data/artifacts/openbb
  FACTOR_PLATFORM_API_KEYS: ${FACTOR_PLATFORM_API_KEYS:-LOCAL_ADMIN_KEY:admin,LOCAL_VIEW_KEY:viewer}
  FACTOR_PLATFORM_PROVIDER_URI: /data/mcqlib/qlib_bin/cn_data
  FACTOR_PLATFORM_US_PROVIDER_URI: /data/mcqlib/qlib_bin/us_data
  FACTOR_PLATFORM_WIND_DATA_ROOT: /data/kaggle/wind_data
  FACTOR_PLATFORM_PROCESSED_DATA_ROOT: /data/kaggle/processed
  FACTOR_PLATFORM_REAL_OHLCV_PATH: /data/kaggle/wind_data/02_daily_stock/stock_daily_ohlcv.parquet
  FACTOR_PLATFORM_FINANCIAL_STATEMENT_PATH: /data/kaggle/processed/financial_statement.parquet
  FACTOR_PLATFORM_TRADABLE_FLAGS_PATH: /data/kaggle/wind_data/01_master/tradable_flags.parquet
  FACTOR_PLATFORM_UNIVERSE_PATH: /data/kaggle/wind_data/01_master/a_share_universe.parquet

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: factor_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-factorplatform_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  backend:
    image: factorplatform-backend:latest
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      <<: *backend-env
    ports:
      - "${BACKEND_PORT:-8002}:8000"
    volumes:
      - ./data:/app/data
      - ${FACTOR_PLATFORM_HOST_MCQLIB_DATA:-./data/portable/mcqlib}:/data/mcqlib:ro
      - ${FACTOR_PLATFORM_HOST_KAGGLE_DATA:-./data/portable/kaggle}:/data/kaggle:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).status < 500 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  worker:
    image: factorplatform-backend:latest
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: ["sh","-lc","celery -A app.tasks.celery_app.celery_app worker -l info"]
    environment:
      <<: *backend-env
    volumes:
      - ./data:/app/data
      - ${FACTOR_PLATFORM_HOST_MCQLIB_DATA:-./data/portable/mcqlib}:/data/mcqlib:ro
      - ${FACTOR_PLATFORM_HOST_KAGGLE_DATA:-./data/portable/kaggle}:/data/kaggle:ro
    depends_on:
      backend:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: factorplatform-frontend:latest
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_KEY: ${NEXT_PUBLIC_API_KEY:-LOCAL_ADMIN_KEY}
        NEXT_PUBLIC_ALLOW_MOCK_FALLBACK: ${NEXT_PUBLIC_ALLOW_MOCK_FALLBACK:-0}
        NEXT_PUBLIC_DEMO_READONLY: ${NEXT_PUBLIC_DEMO_READONLY:-0}
        NEXT_PUBLIC_MOCK_BACKEND: ${NEXT_PUBLIC_MOCK_BACKEND:-0}
        NEXT_PUBLIC_API_BASE_PATH: ${NEXT_PUBLIC_API_BASE_PATH:-/backend}
    environment:
      BACKEND_ORIGIN: http://backend:8000
      FACTOR_PLATFORM_VIEW_KEY: ${NEXT_PUBLIC_API_KEY:-LOCAL_ADMIN_KEY}
      NEXT_PUBLIC_API_KEY: ${NEXT_PUBLIC_API_KEY:-LOCAL_ADMIN_KEY}
      NEXT_PUBLIC_ALLOW_MOCK_FALLBACK: ${NEXT_PUBLIC_ALLOW_MOCK_FALLBACK:-0}
      NEXT_PUBLIC_DEMO_READONLY: ${NEXT_PUBLIC_DEMO_READONLY:-0}
      NEXT_PUBLIC_MOCK_BACKEND: ${NEXT_PUBLIC_MOCK_BACKEND:-0}
      NEXT_PUBLIC_API_BASE_PATH: ${NEXT_PUBLIC_API_BASE_PATH:-/backend}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/dashboard').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 10s
      retries: 6
      start_period: 30s

volumes:
  pgdata:

